<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spontyx — Live &amp; Activity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
<style>
    /* ── Main ── */
    .main { margin-left: 260px; flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      padding: 16px 32px; display: flex; align-items: center; gap: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06); background: var(--navy);
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-search { flex: 1; max-width: 400px; position: relative; }
    .topbar-search input {
      width: 100%; padding: 10px 14px 10px 40px; background: var(--navy-light);
      border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-pill);
      color: var(--off-white); font-size: 0.85rem; font-family: inherit; outline: none;
    }
    .topbar-search input::placeholder { color: var(--grey-dark); }
    .topbar-search input:focus { border-color: rgba(168,225,12,0.3); }
    .topbar-search svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--grey-dark); }
    .topbar-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .topbar-btn {
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: var(--navy-light); cursor: pointer; display: flex;
      align-items: center; justify-content: center; position: relative; transition: background 0.2s;
    }
    .topbar-btn:hover { background: var(--navy-hover); }
    .topbar-btn svg { width: 18px; height: 18px; stroke: var(--grey); fill: none; stroke-width: 1.8; }
    .topbar-btn .notif-dot {
      position: absolute; top: 8px; right: 8px; width: 8px; height: 8px;
      background: var(--coral); border-radius: 50%; border: 2px solid var(--navy);
    }

    .content { padding: 32px; flex: 1; max-width: 1100px; }

    /* ── Page Header ── */
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; }
    .page-header h1 span { color: var(--lime); }
    .page-header p { color: var(--grey); font-size: 0.88rem; }

    /* ── Summary Cards ── */
    .summary-row { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
    .summary-card {
      flex: 1; min-width: 130px; background: var(--navy-card); border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-md); padding: 16px 18px; display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: border-color 0.2s;
    }
    .summary-card:hover { border-color: rgba(255,255,255,0.12); }
    .summary-card-icon {
      width: 40px; height: 40px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .summary-card-icon svg { width: 18px; height: 18px; fill: none; stroke-width: 2; }
    .summary-card-icon.coral { background: rgba(255,107,107,0.12); }
    .summary-card-icon.coral svg { stroke: var(--coral); }
    .summary-card-icon.orange { background: rgba(255,159,67,0.12); }
    .summary-card-icon.orange svg { stroke: var(--orange); }
    .summary-card-icon.purple { background: rgba(124,92,252,0.12); }
    .summary-card-icon.purple svg { stroke: var(--purple); }
    .summary-card-icon.teal { background: rgba(78,205,196,0.12); }
    .summary-card-icon.teal svg { stroke: var(--teal); }
    .summary-card-value { font-size: 1.2rem; font-weight: 800; }
    .summary-card-label { font-size: 0.7rem; color: var(--grey); margin-top: 1px; }

    /* ── Section ── */
    .section { margin-bottom: 36px; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .section-header h2 { font-size: 1.05rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .section-header h2 svg { width: 18px; height: 18px; fill: none; stroke-width: 2; }
    .section-count {
      font-size: 0.68rem; font-weight: 700; padding: 3px 10px; border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.06); color: var(--grey);
    }
    .section-count.coral { background: rgba(255,107,107,0.12); color: var(--coral); }
    .section-count.orange { background: rgba(255,159,67,0.12); color: var(--orange); }

    /* ── Live Match Cards ── */
    .live-matches { display: flex; flex-direction: column; gap: 12px; }

    .live-match {
      background: var(--navy-card); border: 1px solid rgba(255,107,107,0.15);
      border-radius: var(--radius-lg); padding: 20px; display: flex; align-items: center; gap: 20px;
      transition: border-color 0.2s, transform 0.15s; cursor: pointer; text-decoration: none; color: inherit;
    }
    .live-match:hover { border-color: rgba(255,107,107,0.35); transform: translateY(-1px); }

    .live-match-time {
      display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; min-width: 56px;
    }
    .live-dot {
      width: 10px; height: 10px; background: var(--coral); border-radius: 50%;
      animation: pulse-live 2s infinite;
    }
    @keyframes pulse-live { 0%,100%{opacity:1} 50%{opacity:.5} }
    .live-minute { font-size: 0.85rem; font-weight: 800; color: var(--coral); }
    .live-match-teams { flex: 1; min-width: 0; }
    .live-match-versus {
      font-size: 1rem; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .live-match-score {
      font-size: 0.85rem; font-weight: 800; color: var(--lime); background: var(--lime-dim);
      padding: 2px 10px; border-radius: var(--radius-sm);
    }
    .live-match-league {
      font-size: 0.75rem; color: var(--grey); display: flex; align-items: center; gap: 6px;
    }
    .live-match-league svg { width: 12px; height: 12px; stroke: var(--grey-dark); fill: none; stroke-width: 2; }

    .live-match-questions {
      display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0;
      background: rgba(255,107,107,0.08); padding: 10px 16px; border-radius: var(--radius-md);
    }
    .live-q-count { font-size: 1.1rem; font-weight: 900; color: var(--coral); }
    .live-q-label { font-size: 0.62rem; color: var(--grey); text-transform: uppercase; letter-spacing: 0.5px; }

    .live-match-cta {
      padding: 10px 20px; background: var(--lime); color: var(--navy); border: none;
      border-radius: var(--radius-pill); font-size: 0.8rem; font-weight: 800;
      font-family: inherit; cursor: pointer; white-space: nowrap; transition: opacity 0.2s, transform 0.2s; flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(168,225,12,0.3);
    }
    .live-match-cta:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ── Unanswered Questions ── */
    .unanswered-list { display: flex; flex-direction: column; gap: 10px; }

    .unanswered-card {
      background: var(--navy-card); border: 1px solid rgba(255,159,67,0.15);
      border-radius: var(--radius-lg); padding: 18px 20px;
      display: flex; align-items: center; gap: 16px;
      transition: border-color 0.2s; cursor: pointer;
    }
    .unanswered-card:hover { border-color: rgba(255,159,67,0.35); }
    .unanswered-card.urgent { border-color: rgba(255,107,107,0.25); }

    .unanswered-icon {
      width: 44px; height: 44px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .unanswered-icon svg { width: 20px; height: 20px; fill: none; stroke-width: 2; }
    .unanswered-icon.orange { background: rgba(255,159,67,0.12); }
    .unanswered-icon.orange svg { stroke: var(--orange); }
    .unanswered-icon.coral { background: rgba(255,107,107,0.12); }
    .unanswered-icon.coral svg { stroke: var(--coral); }

    .unanswered-info { flex: 1; min-width: 0; }
    .unanswered-question { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; }
    .unanswered-meta { font-size: 0.75rem; color: var(--grey); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .unanswered-meta-item { display: flex; align-items: center; gap: 4px; }
    .unanswered-meta-item svg { width: 12px; height: 12px; stroke: var(--grey-dark); fill: none; stroke-width: 2; }

    .unanswered-timer {
      font-size: 0.78rem; font-weight: 700; padding: 6px 14px; border-radius: var(--radius-pill);
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .unanswered-timer svg { width: 14px; height: 14px; fill: none; stroke-width: 2; }
    .unanswered-timer.warning { background: rgba(255,159,67,0.12); color: var(--orange); }
    .unanswered-timer.warning svg { stroke: var(--orange); }
    .unanswered-timer.critical { background: rgba(255,107,107,0.12); color: var(--coral); }
    .unanswered-timer.critical svg { stroke: var(--coral); }
    .unanswered-timer.ok { background: rgba(78,205,196,0.1); color: var(--teal); }
    .unanswered-timer.ok svg { stroke: var(--teal); }

    .unanswered-answer-btn {
      padding: 8px 18px; border-radius: var(--radius-sm); border: 1px solid rgba(168,225,12,0.2);
      background: transparent; color: var(--lime); font-size: 0.78rem; font-weight: 700;
      font-family: inherit; cursor: pointer; white-space: nowrap; transition: all 0.2s; flex-shrink: 0;
    }
    .unanswered-answer-btn:hover { background: var(--lime); color: var(--navy); }

    /* ── Section icon pill ── */
    .section-icon {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .section-icon svg { width: 16px; height: 16px; fill: none; stroke-width: 2; }
    .section-icon.coral { background: rgba(255,107,107,0.15); }
    .section-icon.coral svg { stroke: var(--coral); }
    .section-icon.orange { background: rgba(255,159,67,0.15); }
    .section-icon.orange svg { stroke: var(--orange); }

    /* ── Match / question list containers ── */
    #live-matches-container { display: flex; flex-direction: column; gap: 12px; }
    #unanswered-container   { display: flex; flex-direction: column; gap: 10px; }

    /* ── Empty state card ── */
    .empty-state {
      background: var(--navy-card); border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-lg); padding: 36px 24px;
      display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center;
    }
    .empty-icon {
      width: 48px; height: 48px; border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center; margin-bottom: 6px;
    }
    .empty-icon svg { width: 22px; height: 22px; fill: none; stroke-width: 2; }
    .empty-icon.coral { background: rgba(255,107,107,0.1); }
    .empty-icon.coral svg { stroke: var(--coral); }
    .empty-icon.orange { background: rgba(255,159,67,0.1); }
    .empty-icon.orange svg { stroke: var(--orange); }
    .empty-title { font-size: 0.9rem; font-weight: 700; }
    .empty-sub { font-size: 0.78rem; color: var(--grey); max-width: 300px; line-height: 1.5; }

    @media (max-width: 700px) {
      .summary-row { flex-direction: column; }
      .live-match { flex-direction: column; align-items: flex-start; }
      .live-match-cta { width: 100%; text-align: center; }
      .unanswered-card { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar-placeholder"></div>

<!-- Main -->
<div class="main">
  <header class="topbar">
    <button class="mobile-menu-btn" onclick="toggleSidebar()">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="topbar-search">
      <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search matches, leagues..." />
    </div>
    <div class="topbar-right">
      <a href="notifications.html" class="topbar-btn" title="Notifications" style="text-decoration:none;">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span class="notif-dot"></span>
      </a>
      <button class="topbar-btn" title="Messages">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      </button>
    </div>
  </header>

  <div class="content">
    <!-- Page Header -->
    <div class="page-header">
      <h1>
        <span>Live</span> &amp; Activity
      </h1>
      <p>Everything happening across your leagues right now — live matches, unanswered questions, and what's coming up.</p>
    </div>

    <!-- Summary Cards -->
    <div class="summary-row">
      <div class="summary-card" onclick="document.getElementById('sec-live').scrollIntoView({behavior:'smooth'})">
        <div class="summary-card-icon coral">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <div>
          <div class="summary-card-value" id="stat-live">—</div>
          <div class="summary-card-label">Live Matches</div>
        </div>
      </div>
      <div class="summary-card" onclick="document.getElementById('sec-unanswered').scrollIntoView({behavior:'smooth'})">
        <div class="summary-card-icon orange">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div>
          <div class="summary-card-value" id="stat-unanswered">—</div>
          <div class="summary-card-label">Unanswered</div>
        </div>
      </div>
      <div class="summary-card">
        <div class="summary-card-icon purple">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div>
          <div class="summary-card-value" id="stat-today">—</div>
          <div class="summary-card-label">Answered Today</div>
        </div>
      </div>
    </div>

    <!-- ═══════ LIVE NOW ═══════ -->
    <div class="section" id="sec-live">
      <div class="section-header">
        <h2>
          <span class="section-icon coral"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span>
          Live Now
          <span class="section-count coral" id="live-count-badge">—</span>
        </h2>
      </div>
      <div id="live-matches-container">
        <div class="feed-loading" style="color:var(--grey);font-size:0.85rem;padding:12px 0;">Loading live matches…</div>
      </div>
    </div>

    <!-- ═══════ UNANSWERED QUESTIONS ═══════ -->
    <div class="section" id="sec-unanswered">
      <div class="section-header">
        <h2>
          <span class="section-icon orange"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></span>
          Unanswered Questions
          <span class="section-count orange" id="unanswered-count-badge">—</span>
        </h2>
      </div>
      <div id="unanswered-container">
          <div class="feed-loading" style="color:var(--grey);font-size:0.85rem;padding:12px 0;">Loading questions…</div>
        </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="utils.js"></script>
<script src="sidebar.js"></script>
<script>SpontixSidebar.init({ type: 'player', active: 'activity.html' });</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="spontix-store.js"></script>
<script>
  const CLOCK_SVG = `<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  const LEAGUE_SVG = `<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>`;
  const BOLT_SVG = `<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`;

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function timeLeft(closesAt) {
    const ms = new Date(closesAt) - Date.now();
    if (ms <= 0) return { label: 'Closing', cls: 'critical' };
    const secs = Math.floor(ms / 1000);
    const mins = Math.floor(secs / 60);
    const hrs  = Math.floor(mins / 60);
    const days = Math.floor(hrs / 24);
    let label, cls;
    if (secs < 300)       { label = `${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')} left`; cls = 'critical'; }
    else if (mins < 60)   { label = `${mins}m left`; cls = 'warning'; }
    else if (hrs < 24)    { label = `${hrs}h ${mins%60}m left`; cls = 'ok'; }
    else                  { label = `${days}d ${hrs%24}h left`; cls = 'ok'; }
    return { label, cls };
  }

  function isLiveQuestion(q) {
    return q.question_type === 'CORE_MATCH_LIVE' || q.match_minute_at_generation != null;
  }

  function renderLiveNow(matches, teamNames) {
    const el = document.getElementById('live-matches-container');
    const count = matches.length;
    document.getElementById('stat-live').textContent = count;
    document.getElementById('live-count-badge').textContent = count === 1 ? '1 match' : `${count} matches`;

    if (!count) { el.innerHTML = EMPTY_LIVE; return; }

    el.innerHTML = matches.map(m => {
      const ids = Array.isArray(m.teamIds) ? m.teamIds.map(String) : [];
      const home = teamNames[ids[0]] || ids[0] || '—';
      const away = teamNames[ids[1]] || ids[1] || '—';
      const matchLabel = (ids[0] && ids[1]) ? `${escHtml(home)} vs ${escHtml(away)}` : escHtml(m.leagueName);
      const minuteLabel = m.minute != null ? `${m.minute}'` : 'LIVE';
      const qCount = m.questions.length;
      const href = `league.html?id=${encodeURIComponent(m.leagueId)}`;
      return `
        <a href="${href}" class="live-match">
          <div class="live-match-time">
            <div class="live-dot"></div>
            <div class="live-minute">${escHtml(minuteLabel)}</div>
          </div>
          <div class="live-match-teams">
            <div class="live-match-versus">${matchLabel}</div>
            <div class="live-match-league">${LEAGUE_SVG}${escHtml(m.leagueName)}</div>
          </div>
          <div class="live-match-questions">
            <div class="live-q-count">${qCount}</div>
            <div class="live-q-label">Active ${qCount === 1 ? 'Q' : 'Qs'}</div>
          </div>
          <button class="live-match-cta" onclick="event.preventDefault(); window.location.href='${href}'">Play Now</button>
        </a>`;
    }).join('');
  }

  function renderUnanswered(questions, leagueMap, teamNames) {
    const el = document.getElementById('unanswered-container');
    const count = questions.length;
    document.getElementById('stat-unanswered').textContent = count;
    document.getElementById('unanswered-count-badge').textContent = `${count} pending`;

    if (!count) { el.innerHTML = EMPTY_UNANSWERED; return; }

    el.innerHTML = questions.map(q => {
      const closes = q.answer_closes_at || q.deadline;
      const { label: timerLabel, cls: timerCls } = timeLeft(closes);
      const live = isLiveQuestion(q);
      const iconCls = live ? 'coral' : 'orange';
      const iconSvg = live ? BOLT_SVG : `<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
      const urgentCls = timerCls === 'critical' ? ' urgent' : '';
      const leagueName = leagueMap[q.league_id] || 'League';
      const matchMeta = q.match_minute_at_generation != null
        ? `<span class="unanswered-meta-item">${BOLT_SVG}Live · ${q.match_minute_at_generation}'</span>`
        : `<span class="unanswered-meta-item"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>Pre-match</span>`;
      const href = `league.html?id=${encodeURIComponent(q.league_id)}`;
      return `
        <div class="unanswered-card${urgentCls}" onclick="window.location.href='${href}'">
          <div class="unanswered-icon ${iconCls}">${iconSvg}</div>
          <div class="unanswered-info">
            <div class="unanswered-question">${escHtml(q.question_text)}</div>
            <div class="unanswered-meta">
              <span class="unanswered-meta-item">${LEAGUE_SVG}${escHtml(leagueName)}</span>
              ${matchMeta}
            </div>
          </div>
          <div class="unanswered-timer ${timerCls}">${CLOCK_SVG}${escHtml(timerLabel)}</div>
          <button class="unanswered-answer-btn" onclick="event.stopPropagation(); window.location.href='${href}'">Answer</button>
        </div>`;
    }).join('');
  }

  const EMPTY_LIVE = `
    <div class="empty-state">
      <div class="empty-icon coral"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
      <div class="empty-title">No live matches right now</div>
      <div class="empty-sub">When a match in your leagues goes live, it'll appear here. Check back closer to kick-off.</div>
    </div>`;
  const EMPTY_UNANSWERED = `
    <div class="empty-state">
      <div class="empty-icon orange"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="empty-title">You're all caught up</div>
      <div class="empty-sub">No open questions across your leagues right now. New questions drop when matches go live.</div>
    </div>`;

  function showLoadError() {
    document.getElementById('live-matches-container').innerHTML = EMPTY_LIVE;
    document.getElementById('unanswered-container').innerHTML = EMPTY_UNANSWERED;
    ['stat-live','stat-unanswered','stat-today'].forEach(id => {
      document.getElementById(id).textContent = '0';
    });
    document.getElementById('live-count-badge').textContent = '0 matches';
    document.getElementById('unanswered-count-badge').textContent = '0 pending';
  }

  async function loadActivityData() {
    const sb = window.sb;
    if (!sb) { showLoadError(); return; }

    const { data: { user } } = await sb.auth.getUser();
    if (!user) { showLoadError(); return; }

    const uid = user.id;
    const now = new Date().toISOString();
    const todayStart = new Date(); todayStart.setHours(0,0,0,0);

    const { data: memberships } = await sb
      .from('league_members')
      .select('league_id, leagues(id, name)')
      .eq('user_id', uid);

    const leagueIds = (memberships || []).map(m => m.league_id);
    const leagueMap = {};
    (memberships || []).forEach(m => { leagueMap[m.league_id] = m.leagues?.name || 'League'; });

    let openQuestions = [];
    if (leagueIds.length) {
      const { data: qs } = await sb
        .from('questions')
        .select('id, league_id, question_text, team_ids, match_id, answer_closes_at, deadline, match_minute_at_generation, question_type')
        .in('league_id', leagueIds)
        .neq('resolution_status', 'resolved')
        .neq('resolution_status', 'voided')
        .or(`answer_closes_at.gt.${now},deadline.gt.${now}`);
      openQuestions = qs || [];
    }

    const openIds = openQuestions.map(q => q.id);
    let myAnsweredIds = new Set();
    if (openIds.length) {
      const { data: answers } = await sb
        .from('player_answers')
        .select('question_id')
        .eq('user_id', uid)
        .in('question_id', openIds);
      (answers || []).forEach(a => myAnsweredIds.add(a.question_id));
    }

    const { count: answeredToday } = await sb
      .from('player_answers')
      .select('*', { count: 'exact', head: true })
      .eq('user_id', uid)
      .gte('created_at', todayStart.toISOString());
    document.getElementById('stat-today').textContent = answeredToday ?? 0;

    const unanswered = openQuestions.filter(q => !myAnsweredIds.has(q.id));

    // Group open questions by match for Live Now
    const matchMap = {};
    openQuestions.forEach(q => {
      const key = q.match_id || `league_${q.league_id}`;
      if (!matchMap[key]) matchMap[key] = {
        matchId: q.match_id, leagueId: q.league_id,
        leagueName: leagueMap[q.league_id] || 'League',
        teamIds: q.team_ids, minute: q.match_minute_at_generation, questions: []
      };
      matchMap[key].questions.push(q);
    });
    const liveMatches = Object.values(matchMap);

    // Fetch team names
    const allTeamIds = [...new Set(
      liveMatches.flatMap(m => Array.isArray(m.teamIds) ? m.teamIds.map(Number).filter(Boolean) : [])
    )];
    let teamNames = {};
    if (allTeamIds.length) {
      const { data: teams } = await sb
        .from('sports_teams')
        .select('api_team_id, name')
        .in('api_team_id', allTeamIds);
      (teams || []).forEach(t => { teamNames[String(t.api_team_id)] = t.name; });
    }

    renderLiveNow(liveMatches, teamNames);
    renderUnanswered(unanswered, leagueMap, teamNames);
  }

  document.addEventListener('DOMContentLoaded', function() {
    const player = SpontixStore.getPlayer();
    document.querySelector('.sidebar-avatar').textContent = player.avatar;
    document.querySelector('.sidebar-avatar').style.backgroundColor = player.avatarColor;
    document.querySelector('.sidebar-profile-name').textContent = player.name;
    document.querySelector('.sidebar-profile-tier').textContent = SpontixStore.getTierLabel(player.tier);

    loadActivityData().catch(err => { console.warn('[activity]', err); showLoadError(); });
  });
</script>

</body>
</html>
