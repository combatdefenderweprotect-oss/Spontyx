<script src="supabase-client.js"></script>
<script src="spontix-store.js"></script>
<script>
function goBackOrFallback(fallback) {
  try { if (document.referrer && new URL(document.referrer).origin === location.origin) { history.back(); return; } } catch (_) {}
  location.href = fallback;
}
// ── State ─────────────────────────────────────────────────────────────────
var currentSessionId  = null;
var currentUserId     = null;
var currentUserHandle = null;
var sessionData       = null;   // arena_sessions row
var players           = [];     // arena_session_players rows
var currentQuestions  = [];
var myAnswers         = {};     // questionId → { answer, is_correct, points_earned }
var currentMyStreak   = 0;      // consecutive correct answers this session
var prevMyAnswers     = {};
var sessionChannel    = null;
var questionsChannel  = null;
var playersChannel    = null;
var pollInterval      = null;
var timerInterval     = null;
var historyOpen       = false;
var historyHasNewQ    = false;
var deepLinkQuestionId = null;
var isSpectator       = false;  // true when viewing a spectatable session as a non-participant

// ── Init ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function() {
  var params = new URLSearchParams(window.location.search);
  currentSessionId   = params.get('id');
  deepLinkQuestionId = params.get('question') || null;
  if (!currentSessionId) {
    showToast('No session ID in URL');
    setTimeout(function(){ window.location.href = 'multiplayer.html'; }, 2000);
    return;
  }

  // Wait for Supabase auth
  if (!window.sb) {
    setTimeout(init, 500);
    return;
  }
  await init();
});

async function init() {
  if (!window.sb) return;

  var { data: { user } } = await window.sb.auth.getUser();
  if (!user) {
    var returnUrl = encodeURIComponent(window.location.href);
    window.location.href = 'login.html?return=' + returnUrl;
    return;
  }
  currentUserId = user.id;

  // Get handle from public.users
  try {
    var { data: profile } = await window.sb
      .from('users')
      .select('handle, name')
      .eq('id', currentUserId)
      .single();
    currentUserHandle = (profile && profile.handle) ? profile.handle : (profile && profile.name ? profile.name.split(' ')[0] : 'You');
  } catch(e) { currentUserHandle = 'You'; }

  document.getElementById('as-my-name').textContent = currentUserHandle;

  await loadSession();
  await loadQuestions();
  await loadPlayers();

  // Membership gate — spectator branch
  var isParticipant = players.some(function(p) { return p.user_id === currentUserId; });
  if (sessionData && !isParticipant) {
    if (sessionData.is_spectatable) {
      // Allowed as read-only spectator
      isSpectator = true;
      document.getElementById('as-spectator-banner').style.display = 'flex';
    } else {
      // Private session — show locked state, do not redirect
      showLockedState();
      return;
    }
  }

  if (sessionData && sessionData.status !== 'completed' && sessionData.status !== 'cancelled') {
    startRealtime();
    startPoll();
    startTimerTick();

    // Deep-link: scroll to a specific question if ?question= is in the URL
    if (deepLinkQuestionId) {
      var targetQ      = currentQuestions.find(function(q) { return q.id === deepLinkQuestionId; });
      var targetActive = targetQ && qState(targetQ) === 'active';
      if (targetQ && !targetActive) {
        // Question is in history drawer — open it and wait for render before scrolling
        openHistory();
        var histBody = document.getElementById('as-hist-body');
        if (histBody) {
          histBody.addEventListener('history-rendered', function onRendered() {
            histBody.removeEventListener('history-rendered', onRendered);
            scrollToDeepLinkQuestion();
          }, { once: true });
        }
      }
      // If active, scrollToDeepLinkQuestion() is called from renderFeed() via setTimeout
    }
  } else if (sessionData && (sessionData.status === 'completed' || sessionData.status === 'cancelled')) {
    showCompleteOverlay(deepLinkQuestionId);
  }
}

// ── Locked state ─────────────────────────────────────────────────────────
function showLockedState() {
  // Hide all live-session chrome except the topbar
  var elementsToHide = ['as-scoreboard', 'as-spectator-banner', 'as-feed', 'as-complete-overlay', 'as-hist-btn', 'as-hist-overlay', 'as-streak-notif', 'as-comeback-notif'];
  elementsToHide.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });

  var matchName = (sessionData && sessionData.home_team_name && sessionData.away_team_name)
    ? sessionData.home_team_name + ' vs ' + sessionData.away_team_name
    : 'Arena Session';

  var locked = document.createElement('div');
  locked.className = 'as-locked-state';
  locked.innerHTML =
    '<div class="as-locked-icon">🔒</div>' +
    '<div class="as-locked-title">Private Session</div>' +
    '<div class="as-locked-body">' +
      escHtml(matchName) + ' is a private match.<br>Only participants can view this session.' +
    '</div>' +
    '<button class="as-locked-btn" onclick="window.location.href=\'multiplayer.html\'">← Back to Arena</button>';

  document.getElementById('app').appendChild(locked);
}

// ── Deep-link helpers ─────────────────────────────────────────────────────
function highlightElement(el) {
  if (!el) return;
  el.classList.add('deep-link-highlight');
  setTimeout(function() { el.classList.remove('deep-link-highlight'); }, 1500);
}

function scrollToDeepLinkQuestion() {
  if (!deepLinkQuestionId) return;
  var attempts    = 0;
  var maxAttempts = 5;
  function tryScroll() {
    var el = document.querySelector('[data-qid="' + deepLinkQuestionId + '"]');
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      highlightElement(el);
      return;
    }
    attempts++;
    if (attempts < maxAttempts) setTimeout(tryScroll, 300);
  }
  requestAnimationFrame(function() { tryScroll(); });
}

// ── Data Loaders ──────────────────────────────────────────────────────────
async function loadSession() {
  if (!window.sb) return;
  try {
    var { data } = await window.sb
      .from('arena_sessions')
      .select('id, match_id, half_scope, mode, status, home_team_name, away_team_name, kickoff_at, started_at, completed_at, winner_user_id, winning_team_number')
      .eq('id', currentSessionId)
      .single();
    sessionData = data;
    renderTopbar();
  } catch(e) { console.warn('[arena] loadSession error:', e); }
}

async function loadPlayers() {
  if (!window.sb) return;
  try {
    var { data: rows, error: rowErr } = await window.sb
      .from('arena_session_players')
      .select('user_id, score, correct_answers, total_answers, team_number')
      .eq('session_id', currentSessionId);
    if (rowErr) { console.warn('[arena] loadPlayers rows error:', rowErr); return; }

    var playerRows = rows || [];
    if (playerRows.length > 0) {
      var uids = playerRows.map(function(p) { return p.user_id; });
      var { data: profiles } = await window.sb
        .from('users')
        .select('id, handle, name')
        .in('id', uids);
      var profileMap = {};
      (profiles || []).forEach(function(u) { profileMap[u.id] = u; });
      playerRows.forEach(function(p) {
        var u = profileMap[p.user_id];
        p._handle = u ? (u.handle || (u.name ? u.name.split(' ')[0] : null)) : null;
      });
    }

    players = playerRows;
    renderScoreboard();
  } catch(e) { console.warn('[arena] loadPlayers error:', e); }
}

async function loadQuestions() {
  if (!window.sb || !currentSessionId) return;
  var feed = document.getElementById('as-questions-feed');
  try {
    var cols = [
      'id', 'question_text', 'options', 'question_type', 'event_type', 'source_badge',
      'match_id', 'visible_from', 'answer_closes_at', 'opens_at', 'deadline', 'resolves_after',
      'resolution_status', 'resolution_outcome', 'resolution_predicate',
      'base_value', 'difficulty_multiplier', 'match_minute_at_generation',
      'clutch_context', 'created_at'
    ].join(', ');

    // Only show questions that became visible after this session started.
    // Prevents a newly-paired session from inheriting questions from a prior
    // session on the same fixture. Falls back to unfiltered if started_at is null.
    var qQuery = window.sb
      .from('questions')
      .select(cols)
      .eq('arena_session_id', currentSessionId);
    if (sessionData && sessionData.started_at) {
      qQuery = qQuery.gte('visible_from', sessionData.started_at);
    }
    var { data: qs } = await qQuery
      .order('created_at', { ascending: false })
      .limit(30);

    var now = new Date();
    currentQuestions = (qs || []).filter(function(q) {
      var vf = q.visible_from ? new Date(q.visible_from) : (q.opens_at ? new Date(q.opens_at) : null);
      return !vf || vf <= now;
    });

    // Load answers for current user
    myAnswers = {};
    if (currentQuestions.length > 0) {
      var qIds = currentQuestions.map(function(q) { return q.id; });
      var { data: answers } = await window.sb
        .from('player_answers')
        .select('question_id, answer, is_correct, points_earned, multiplier_breakdown, is_clutch, streak_at_answer, leader_gap_at_answer')
        .eq('user_id', currentUserId)
        .in('question_id', qIds);
      (answers || []).forEach(function(a) { myAnswers[a.question_id] = a; });
    }

    // Detect newly-resolved
    var prev = prevMyAnswers;
    prevMyAnswers = JSON.parse(JSON.stringify(myAnswers));
    var hasNewCorrect = false;
    var hasNewWrong   = false;
    Object.keys(myAnswers).forEach(function(qid) {
      var curr = myAnswers[qid];
      var p    = prev[qid];
      if (!curr || p && p.is_correct !== null && p.is_correct !== undefined) return;
      if (curr.is_correct === true  && !(p && p.is_correct === true))  hasNewCorrect = true;
      if (curr.is_correct === false && !(p && p.is_correct === false)) hasNewWrong   = true;
      if (curr.is_correct === true  && !(p && p.is_correct === true))  showPtsNotif(curr.points_earned || 0);
    });
    if (hasNewCorrect || hasNewWrong) {
      computeCurrentStreak().then(function(streak) {
        currentMyStreak = streak;
        updateStreakUI(streak);
        if (hasNewCorrect && streak >= 2) showStreakNotif(streak);
      });
    }

    renderFeed();

    // History new-question indicator
    if (historyOpen) {
      var now2 = new Date();
      var hasActive = (currentQuestions || []).some(function(q) {
        return q.answer_closes_at && new Date(q.answer_closes_at) > now2;
      });
      if (hasActive && !historyHasNewQ) {
        historyHasNewQ = true;
        var _hBanner = document.getElementById('as-hist-new-banner');
        var _hBtn    = document.getElementById('as-hist-btn');
        if (_hBanner) _hBanner.classList.add('show');
        if (_hBtn)    _hBtn.classList.add('has-new');
      }
    }

  } catch(e) {
    console.warn('[arena] loadQuestions error:', e);
    if (feed) feed.innerHTML = '<div class="as-feed-empty">Could not load questions — check your connection.</div>';
  }
}

// ── Render ────────────────────────────────────────────────────────────────
function renderTopbar() {
  if (!sessionData) return;
  var home  = sessionData.home_team_name || 'Home';
  var away  = sessionData.away_team_name || 'Away';
  document.getElementById('as-match-name').textContent = home + ' vs ' + away;

  var halfLabels = { full_match: 'Full Match', first_half: '1st Half', second_half: '2nd Half' };
  document.getElementById('as-half-badge').textContent = halfLabels[sessionData.half_scope] || sessionData.half_scope;
  document.getElementById('as-mode-badge').textContent = sessionData.mode || '1v1';

  document.title = home + ' vs ' + away + ' — Arena';
}

function getInitials(handle) {
  if (!handle) return '?';
  var parts = handle.trim().split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  return handle.slice(0, 2).toUpperCase();
}

function renderScoreboard() {
  var sb = document.getElementById('as-scoreboard');
  if (!sb) return;

  var me  = players.find(function(p) { return p.user_id === currentUserId; });
  var opp = players.find(function(p) { return p.user_id !== currentUserId; });

  var myScore    = me  ? (me.score  || 0) : 0;
  var oppScore   = opp ? (opp.score || 0) : 0;
  var myCorrect  = me  ? (me.correct_answers  || 0) : 0;
  var oppCorrect = opp ? (opp.correct_answers || 0) : 0;

  document.getElementById('as-my-score').textContent    = myScore;
  document.getElementById('as-opp-score').textContent   = oppScore;

  var myCorEl  = document.getElementById('as-my-correct');
  var oppCorEl = document.getElementById('as-opp-correct');
  if (myCorEl)  myCorEl.textContent  = myCorrect  + ' correct';
  if (oppCorEl) oppCorEl.textContent = oppCorrect + ' correct';

  var myHandle  = currentUserHandle || 'You';
  var oppHandle = opp ? (opp._handle || 'Opponent') : '??';
  document.getElementById('as-my-name').textContent  = myHandle;
  document.getElementById('as-opp-name').textContent = oppHandle;

  var myAv  = document.getElementById('as-my-avatar');
  var oppAv = document.getElementById('as-opp-avatar');
  if (myAv)  myAv.textContent  = getInitials(myHandle);
  if (oppAv) oppAv.textContent = getInitials(oppHandle);

  var myRing  = document.getElementById('as-my-ring');
  var oppRing = document.getElementById('as-opp-ring');
  if (myRing && oppRing) {
    myRing.className  = 'as-avatar-ring';
    oppRing.className = 'as-avatar-ring';
    if      (myScore > oppScore)  { myRing.classList.add('leading');  oppRing.classList.add('losing'); }
    else if (oppScore > myScore)  { oppRing.classList.add('leading'); myRing.classList.add('losing'); }
  }

  sb.style.display = (players.length >= 2) ? 'flex' : 'none';
  updateStreakUI(currentMyStreak);
  updateComebackUI(myScore, oppScore);
}

function renderFeed() {
  var feed = document.getElementById('as-questions-feed');
  if (!feed) return;

  var qs = currentQuestions;
  if (!qs.length) {
    feed.innerHTML = '<div class="as-feed-empty">' +
      '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/>' +
      '<polyline points="12 6 12 12 16 14"/></svg>' +
      'No questions yet — they will appear here as the match progresses.</div>';
    return;
  }

  // Sort: active (soonest expiry first) → closed → resolved → voided
  var stateOrder = { active: 0, closed: 1, resolved: 2, voided: 3, upcoming: 4 };
  qs.sort(function(a, b) {
    var sa = qState(a), sb2 = qState(b);
    var d = (stateOrder[sa] || 0) - (stateOrder[sb2] || 0);
    if (d !== 0) return d;
    if (sa === 'active') {
      var ca = qClosesAt(a), cb = qClosesAt(b);
      if (ca && cb) return ca.getTime() - cb.getTime();
    }
    return new Date(b.created_at) - new Date(a.created_at);
  });

  var hasActive = qs.some(function(q) { return qState(q) === 'active'; });
  var html = '';

  if (!hasActive && sessionData && sessionData.status === 'active') {
    html += '<div class="as-holding">' +
      '<div class="as-holding-dot"></div>' +
      '<div class="as-holding-title">Next moment dropping soon</div>' +
      '<div class="as-holding-sub">Live questions appear here as the match unfolds</div>' +
      '</div>';

    // Client-side fallback: if no active questions remain, ask the RPC whether the
    // session should be completed (all questions resolved/voided). The RPC is
    // idempotent and has all necessary guards. If it completes the session, the
    // Realtime subscription below will fire showCompleteOverlay() for all clients.
    // Fire-and-forget — never call showCompleteOverlay() directly from here.
    window.sb.rpc('complete_arena_session', { p_session_id: currentSessionId })
      .then(function(res) {
        if (res.error) {
          console.warn('[arena-session] complete_arena_session fallback error:', res.error.message);
        } else if (res.data && res.data.completed) {
          console.log('[arena-session] complete_arena_session fallback: session completed via client poll');
        }
      });
  }

  var isPrimarySet = false;
  html += qs.map(function(q) {
    var isPrimary = false;
    if (!isPrimarySet && qState(q) === 'active') { isPrimary = true; isPrimarySet = true; }
    return renderCard(q, isPrimary);
  }).join('');

  feed.innerHTML = html;

  // Scroll to deep-linked question if present (defer one tick to let DOM paint)
  setTimeout(function() { scrollToDeepLinkQuestion(); }, 0);

  // Animate newly-resolved cards
  qs.forEach(function(q) {
    var curr = myAnswers[q.id];
    var prev = prevMyAnswers[q.id];
    if (!curr || !prev) return;
    if (curr.is_correct === true  && !(prev.is_correct === true)) {
      var el = feed.querySelector('[data-qid="' + q.id + '"]');
      if (el) { el.classList.add('glow-correct'); setTimeout(function(){ el.classList.remove('glow-correct'); }, 900); }
    }
    if (curr.is_correct === false && !(prev.is_correct === false)) {
      var el2 = feed.querySelector('[data-qid="' + q.id + '"]');
      if (el2) { el2.classList.add('shake-wrong'); setTimeout(function(){ el2.classList.remove('shake-wrong'); }, 500); }
    }
  });
}

function renderCard(q, isPrimary) {
  var state = qState(q);
  var my    = myAnswers[q.id];
  var opts  = parseOptions(q.options);
  var now   = new Date();

  // Card classes
  var cls = 'as-qcard';
  if (isPrimary) cls += ' primary';
  if (state === 'resolved' && my) {
    cls += my.is_correct ? ' resolved-correct' : ' resolved-wrong';
  }
  if (state === 'voided') cls += ' voided';
  if (isDisplayClutch(q) && state === 'active') cls += ' clutch-state';

  // Lane badge
  var lane = detectLane(q);
  var laneHtml = '<span class="as-lane-badge ' + (lane === 'LIVE' ? 'live' : lane === 'PREMATCH' ? 'prematch' : 'rw') + '">' +
    (lane === 'LIVE' ? '⚡ Live' : lane === 'PREMATCH' ? 'Pre-Match' : 'Real World') + '</span>';

  // Engagement badges
  var engHtml = '';
  if (state === 'active') {
    var badges = [];
    var bv = q.base_value || 0;
    if (bv >= 20 || ['goal','penalty','red_card'].indexOf(q.event_type) >= 0) badges.push('<span class="as-eng-badge hv">High Value</span>');
    if (isDisplayClutch(q)) badges.push('<span class="as-eng-badge clutch">Clutch</span>');
    var closes = qClosesAt(q);
    if (closes && (closes - now) < 180000) badges.push('<span class="as-eng-badge fast">Fast</span>');
    if (currentMyStreak >= 4) badges.push('<span class="as-eng-badge hot-streak">HOT STREAK ×1.3</span>');
    else if (currentMyStreak === 3) badges.push('<span class="as-eng-badge streak">STREAK ×1.2</span>');
    else if (currentMyStreak === 2) badges.push('<span class="as-eng-badge streak">STREAK ×1.1</span>');
    var me2  = players.find(function(p) { return p.user_id === currentUserId; });
    var opp2 = players.find(function(p) { return p.user_id !== currentUserId; });
    if (me2 && opp2) {
      var cb = getComeback(me2.score || 0, opp2.score || 0);
      if (cb) badges.push('<span class="as-eng-badge ' + (cb.isMax ? 'comeback-max' : 'comeback') + '">COMEBACK ' + cb.multLabel + '</span>');
    }
    if (badges.length) engHtml = '<div class="as-eng-badges">' + badges.join('') + '</div>';
  }

  // Timer
  var timerHtml = '';
  if (state === 'active') {
    var closes = qClosesAt(q);
    if (closes) {
      var ms = closes - now;
      var isUrgent = ms < 60000;
      timerHtml = '<span class="as-timer' + (isUrgent ? ' urgent' : '') +
        '" data-closes-at="' + closes.toISOString() + '">' + fmtMs(ms) + '</span>';
    }
  }

  // Timer bar
  var barHtml = '';
  if (state === 'active') {
    var closes = qClosesAt(q);
    var opens  = q.visible_from ? new Date(q.visible_from) : (q.opens_at ? new Date(q.opens_at) : null);
    if (closes && opens) {
      var total  = closes - opens;
      var remain = Math.max(0, closes - now);
      var pct    = total > 0 ? Math.round((remain / total) * 100) : 0;
      var isUrg  = remain < 60000;
      barHtml = '<div class="as-timer-bar-wrap' + (isUrg ? ' urgent' : '') +
        '" data-closes-at="' + closes.toISOString() + '" data-total-ms="' + total + '">' +
        '<div class="as-timer-bar-fill" style="width:' + pct + '%"></div></div>';
    }
  }

  // Live window strip for match_stat_window predicates
  var windowStripHtml = '';
  if (state === 'active' && lane === 'LIVE' && q.resolution_predicate) {
    try {
      var pred = typeof q.resolution_predicate === 'string' ? JSON.parse(q.resolution_predicate) : q.resolution_predicate;
      if (pred && pred.resolution_type === 'match_stat_window') {
        var emoji = pred.field === 'cards' ? '🟨' : '⚽';
        var winText = pred.anchoring_type === 'match_phase' ? 'Before full-time' :
                      pred.anchoring_type === 'deadline'    ? 'Before ' + pred.window_end_minute + '\'' :
                      pred.window_start_minute + '\' – ' + pred.window_end_minute + '\'';
        windowStripHtml = '<div class="as-live-window-strip">' +
          emoji + ' ' + winText + ' · 🔒 Closes before ' + pred.window_start_minute + '\'</div>';
      }
    } catch(e) {}
  }

  // Options HTML
  // Spectators: buttons always disabled, no onclick, no resolution highlighting on unresolved questions
  var spectatorHideOutcome = isSpectator && state !== 'resolved';
  var optHtml = '<div class="as-options">';
  opts.forEach(function(opt) {
    var disabled  = isSpectator || state !== 'active';
    var sel       = !isSpectator && my && my.answer === opt.id;
    var correct   = !spectatorHideOutcome && state === 'resolved' && opt.id === q.resolution_outcome;
    var wrong     = !spectatorHideOutcome && state === 'resolved' && sel && opt.id !== q.resolution_outcome;
    var optCls    = 'as-opt';
    if (sel && state === 'active') optCls += ' selected';
    if (correct) optCls += ' correct';
    if (wrong)   optCls += ' wrong';
    if (disabled) optCls += ' disabled-opt';

    var icon = '';
    if (correct) icon = '<svg class="as-opt-icon" viewBox="0 0 24 24" stroke="#A8E10C" stroke-width="2.5" fill="none"><polyline points="20 6 9 17 4 12"/></svg>';
    if (wrong)   icon = '<svg class="as-opt-icon" viewBox="0 0 24 24" stroke="#FF6B6B" stroke-width="2.5" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

    // Never add onclick for spectators
    var click = (!isSpectator && !disabled && state === 'active') ?
      ' onclick="handleAnswer(this, \'' + q.id + '\', \'' + escAttr(opt.id) + '\')"' : '';

    optHtml += '<button class="' + optCls + '"' + (disabled ? ' disabled' : '') + click + '>' +
      icon + escHtml(opt.label || opt.id) + '</button>';
  });
  optHtml += '</div>';

  // Spectator note (replaces current-pick label)
  var pickLabel = '';
  if (isSpectator && state === 'active') {
    pickLabel = '<div class="as-spectator-note">👁 Watching — answers locked for spectators</div>';
  } else if (!isSpectator && my && my.answer && state === 'active') {
    pickLabel = '<div class="as-current-pick">Your current pick — tap to change</div>';
  }

  // Footer
  var footerHtml = '<div class="as-qcard-footer">';
  if (state === 'active') {
    footerHtml += '<span>🕐 ' + (timerHtml || '—') + '</span>';
    var bv2 = q.base_value || 6;
    footerHtml += '<span class="as-pts-range">Up to ' + Math.round(bv2 * 1.5 * 1.3 * 1.3 * 1.25) + ' pts</span>';
  } else if (state === 'closed') {
    footerHtml += '<span>Awaiting result…</span>';
  } else if (state === 'resolved' && my) {
    var res = my.is_correct;
    if (res === true)  footerHtml += '<span class="as-result-row as-result-correct">✓ Correct · <strong>' + (my.points_earned || 0) + ' pts</strong></span>';
    if (res === false) footerHtml += '<span class="as-result-row as-result-wrong">✗ Wrong · 0 pts</span>';
    if (res === null || res === undefined) footerHtml += '<span>Resolved</span>';
  } else if (state === 'voided') {
    footerHtml += '<span class="as-result-voided">Voided — did not count</span>';
  } else {
    footerHtml += '<span>—</span>';
  }
  footerHtml += '</div>';

  return '<div class="' + cls + '" data-qid="' + q.id + '">' +
    '<div class="as-qcard-header">' + laneHtml + timerHtml + '</div>' +
    barHtml +
    engHtml +
    windowStripHtml +
    '<div class="as-question-text">' + escHtml(q.question_text) + '</div>' +
    optHtml + pickLabel + footerHtml +
    '</div>';
}

// ── Scoring helpers (ported from league.html) ─────────────────────────────

// Returns the number of consecutive correct answers by the current user
// in this arena session (most recent resolved answers first).
async function computeCurrentStreak() {
  try {
    // Pull the last 6 resolved answers for this user in this session
    var { data: recent } = await window.sb
      .from('player_answers')
      .select('is_correct, resolved_at')
      .eq('user_id', currentUserId)
      .eq('arena_session_id', currentSessionId)
      .not('is_correct', 'is', null)
      .order('resolved_at', { ascending: false })
      .limit(6);

    if (!recent || !recent.length) return 0;
    var streak = 0;
    for (var i = 0; i < recent.length; i++) {
      if (recent[i].is_correct === true) streak++;
      else break;
    }
    return streak;
  } catch(e) { return 0; }
}

// Returns the point gap between the current user and the session leader.
async function computeLeaderGap() {
  try {
    // Aggregate correct points per user in this session
    var { data: rows } = await window.sb
      .from('player_answers')
      .select('user_id, points_earned')
      .eq('arena_session_id', currentSessionId)
      .eq('is_correct', true);

    if (!rows || !rows.length) return 0;
    var totals = {};
    rows.forEach(function(r) {
      totals[r.user_id] = (totals[r.user_id] || 0) + (r.points_earned || 0);
    });
    var leaderScore = Math.max.apply(null, Object.values(totals));
    var myScore     = totals[currentUserId] || 0;
    return Math.max(0, leaderScore - myScore);
  } catch(e) { return 0; }
}

// ── Answer Submission ─────────────────────────────────────────────────────
async function handleAnswer(btn, questionId, answer) {
  if (isSpectator) return;  // spectators cannot answer
  if (!currentUserId || !window.sb) { showToast('Sign in to answer'); return; }

  var q = currentQuestions.find(function(x) { return x.id === questionId; });
  if (!q) { showToast('Question not found'); return; }

  if (qState(q) !== 'active') {
    showToast('This question is no longer accepting answers');
    await loadQuestions(); renderFeed();
    return;
  }

  // Optimistic UI
  var siblings = btn.parentElement.querySelectorAll('.as-opt');
  siblings.forEach(function(s) { s.classList.remove('selected'); });
  btn.classList.add('selected');

  var hadPrev = !!(myAnswers[questionId] && myAnswers[questionId].answer);
  myAnswers[questionId] = myAnswers[questionId] || {};
  myAnswers[questionId].answer = answer;

  // Clutch multiplier from match minute
  var minute = q.match_minute_at_generation || 0;
  var clutch = minute >= 70 ? 1.25 : 1.0;

  // Compute streak + leader gap in parallel (best-effort; fall back to 0)
  var scoringCtx = await Promise.all([computeCurrentStreak(), computeLeaderGap()]);
  var streakNow  = scoringCtx[0];
  var gapNow     = scoringCtx[1];

  try {
    var payload = {
      question_id:               questionId,
      user_id:                   currentUserId,
      arena_session_id:          currentSessionId,
      answer:                    answer,
      answered_at:               new Date().toISOString(),
      clutch_multiplier_at_answer: clutch,
      leader_gap_at_answer:      gapNow,
      streak_at_answer:          streakNow,
    };
    // Note: no league_id — arena answers use arena_session_id path

    var { error } = await window.sb
      .from('player_answers')
      .upsert(payload, { onConflict: 'question_id,user_id' });

    if (error) throw error;
    if (hadPrev) {
      showToast('Answer updated ✓');
    } else {
      var me3  = players.find(function(p) { return p.user_id === currentUserId; });
      var opp3 = players.find(function(p) { return p.user_id !== currentUserId; });
      if (me3 && opp3) showComebackNotif(me3.score || 0, opp3.score || 0);
    }

  } catch(e) {
    console.warn('[arena] handleAnswer error:', e);
    if (e.code === '23514' || (e.message && e.message.toLowerCase().includes('check'))) {
      showToast('Answer window just closed');
      await loadQuestions(); renderFeed();
    } else {
      showToast('Could not save — try again');
    }
  }
}

// ── Session Complete Overlay ──────────────────────────────────────────────
async function showCompleteOverlay(focusId) {
  var overlay = document.getElementById('as-complete-overlay');
  if (!overlay) return;
  if (overlay.classList.contains('show')) return;

  var me  = players.find(function(p) { return p.user_id === currentUserId; });
  var opp = players.find(function(p) { return p.user_id !== currentUserId; });

  var myScore    = me  ? (me.score  || 0) : 0;
  var oppScore   = opp ? (opp.score || 0) : 0;
  var myCorrect  = me  ? (me.correct_answers  || 0) : 0;
  var oppCorrect = opp ? (opp.correct_answers || 0) : 0;

  var winnerId    = sessionData && sessionData.winner_user_id;
  var winningTeam = sessionData && sessionData.winning_team_number;
  var myTeam      = me ? me.team_number : null;

  var iWon, isDraw;
  if (winnerId) {
    // 1v1: winner_user_id is authoritative
    iWon   = (winnerId === currentUserId);
    isDraw = false;
  } else if (winningTeam && myTeam) {
    // 2v2: winning_team_number is authoritative
    iWon   = (myTeam === winningTeam);
    isDraw = false;
  } else {
    // Fallback: compare scores
    iWon   = myScore > oppScore;
    isDraw = myScore === oppScore;
  }

  var myHandle  = currentUserHandle || 'You';
  var oppHandle = opp ? (opp._handle || 'Opponent') : 'Opponent';

  // Headline
  var headlineEl = document.getElementById('as-result-headline');
  var subtitleEl = document.getElementById('as-result-subtitle');
  if (headlineEl) {
    headlineEl.textContent = iWon ? 'YOU WIN!' : isDraw ? 'DRAW' : 'YOU LOSE';
    headlineEl.className   = 'as-result-headline ' + (iWon ? 'win' : isDraw ? 'draw' : 'loss');
  }
  if (subtitleEl) {
    subtitleEl.textContent = iWon ? 'Outstanding performance' : isDraw ? 'Too close to call' : 'Better luck next time';
  }

  // Duel row
  var duelEl = document.getElementById('as-result-duel');
  if (duelEl) {
    var myRingCls  = iWon ? 'winner' : (!isDraw ? 'loser' : '');
    var oppRingCls = !iWon && !isDraw ? 'winner' : (iWon ? 'loser' : '');
    var myScoreCls  = iWon ? 'as-result-final-score winner' : 'as-result-final-score';
    var oppScoreCls = (!iWon && !isDraw) ? 'as-result-final-score winner' : 'as-result-final-score';
    duelEl.innerHTML =
      '<div class="as-result-player">' +
        '<div class="as-result-ring ' + myRingCls + '"><div class="as-result-avatar">' + escHtml(getInitials(myHandle)) + '</div></div>' +
        '<div class="as-result-handle me">' + escHtml(myHandle) + '</div>' +
        '<div class="' + myScoreCls + '">' + myScore + '</div>' +
      '</div>' +
      '<div class="as-result-vs"><div class="as-result-vs-sep">VS</div></div>' +
      '<div class="as-result-player">' +
        '<div class="as-result-ring ' + oppRingCls + '"><div class="as-result-avatar">' + escHtml(getInitials(oppHandle)) + '</div></div>' +
        '<div class="as-result-handle">' + escHtml(oppHandle) + '</div>' +
        '<div class="' + oppScoreCls + '">' + oppScore + '</div>' +
      '</div>';
  }

  // Stats row — shown immediately; XP + rating fill in async
  function renderStats(myXp, myRatingDelta) {
    var statsEl = document.getElementById('as-result-stats');
    if (!statsEl) return;

    var xpHtml = myXp !== null
      ? '<div class="as-result-stat"><div class="as-result-stat-val lime">+' + myXp + '</div><div class="as-result-stat-label">XP Earned</div></div>'
      : '<div class="as-result-stat"><div class="as-result-stat-val" style="color:rgba(255,255,255,0.3)">…</div><div class="as-result-stat-label">XP Earned</div></div>';

    var ratingHtml;
    if (myRatingDelta === undefined) {
      // still loading
      ratingHtml = '<div class="as-result-stat"><div class="as-result-stat-val" style="color:rgba(255,255,255,0.3)">…</div><div class="as-result-stat-label">Rating</div></div>';
    } else if (myRatingDelta === null) {
      // skipped / not applicable
      ratingHtml = '';
    } else {
      var sign      = myRatingDelta > 0 ? '+' : '';
      var cls       = myRatingDelta > 0 ? 'gain' : myRatingDelta < 0 ? 'loss' : 'none';
      ratingHtml =
        '<div class="as-result-stat">' +
          '<div class="as-result-stat-val" style="color:' + (myRatingDelta > 0 ? '#4ECDC4' : myRatingDelta < 0 ? '#FF6B6B' : 'rgba(255,255,255,0.5)') + '">' +
            sign + myRatingDelta +
          '</div>' +
          '<div class="as-result-stat-label">Rating</div>' +
          '<div class="as-rating-delta ' + cls + '">' + sign + myRatingDelta + ' SR</div>' +
        '</div>';
    }

    statsEl.innerHTML =
      '<div class="as-result-stat"><div class="as-result-stat-val lime">' + myCorrect + '</div><div class="as-result-stat-label">Correct</div></div>' +
      '<div class="as-result-stat"><div class="as-result-stat-val">' + myScore + '</div><div class="as-result-stat-label">Points</div></div>' +
      xpHtml +
      ratingHtml;
  }

  if (isSpectator) {
    // Spectator overlay: show scores only, skip XP/rating tiles and personal question review
    var statsEl = document.getElementById('as-result-stats');
    if (statsEl) {
      statsEl.innerHTML =
        '<div class="as-result-stat"><div class="as-result-stat-val lime">' + myCorrect + '</div><div class="as-result-stat-label">Correct</div></div>' +
        '<div class="as-result-stat"><div class="as-result-stat-val">' + myScore + '</div><div class="as-result-stat-label">Points</div></div>';
    }
    overlay.classList.add('show');
    stopPoll();
    stopTimerTick();
    return;
  }

  renderStats(null, undefined);  // show immediately with both pending
  overlay.classList.add('show');
  renderQuestionReview(focusId);
  stopPoll();
  stopTimerTick();

  // Award XP and update rating in parallel
  Promise.all([
    awardSessionXp(iWon, isDraw),
    updateArenaRatings()
  ]).then(function(results) {
    var xpResult     = results[0];
    var ratingResult = results[1];
    var myXp    = xpResult && xpResult.awarded_xp != null ? xpResult.awarded_xp : null;
    var myDelta = null;
    if (ratingResult && ratingResult.updated && Array.isArray(ratingResult.players)) {
      var mine = ratingResult.players.find(function(p) { return p.user_id === currentUserId; });
      if (mine) myDelta = mine.delta;
    }
    renderStats(myXp, myDelta);
  });
}

function renderQuestionReview(focusId) {
  var el = document.getElementById('as-qreview');
  if (!el) return;

  // Sort questions chronologically
  var qs = (currentQuestions || []).slice().sort(function(a, b) {
    return new Date(a.created_at) - new Date(b.created_at);
  });

  if (!qs.length) { el.innerHTML = ''; return; }

  function getAnswerLabel(opts, answerId) {
    if (!answerId) return null;
    var norm = parseOptions(opts);
    var match = norm.find(function(o) { return o.id === answerId; });
    return match ? match.label : answerId;
  }

  var cards = qs.map(function(q, idx) {
    var a       = myAnswers[q.id];
    var status  = q.resolution_status;
    var outcome = q.resolution_outcome;

    // Determine card state
    var state;
    if (status !== 'resolved' && status !== 'voided') {
      state = a ? 'pending' : 'missed';
    } else if (status === 'voided') {
      state = 'missed';
    } else if (!a) {
      state = 'missed';
    } else {
      state = a.is_correct ? 'correct' : 'wrong';
    }

    var badgeLabel = { correct: 'Correct', wrong: 'Wrong', missed: 'Missed', pending: 'Pending' }[state];

    // Answers row
    var myAnswerLabel   = a ? getAnswerLabel(q.options, a.answer) : null;
    var corrAnswerLabel = outcome ? getAnswerLabel(q.options, outcome) : null;

    var answersHtml = '';
    if (myAnswerLabel) {
      var myValClass = state === 'correct' ? 'highlight-correct' : (state === 'wrong' ? 'highlight-wrong' : '');
      answersHtml += '<div class="as-qr-answer-row">'
        + '<span class="as-qr-answer-label">Your pick</span>'
        + '<span class="as-qr-answer-val ' + myValClass + '">' + escHtml(myAnswerLabel) + '</span>'
        + '</div>';
    }
    if (corrAnswerLabel && state !== 'pending') {
      answersHtml += '<div class="as-qr-answer-row">'
        + '<span class="as-qr-answer-label">Answer</span>'
        + '<span class="as-qr-answer-val highlight-correct">' + escHtml(corrAnswerLabel) + '</span>'
        + '</div>';
    }

    // Points
    var pts     = a && a.points_earned != null ? a.points_earned : 0;
    var ptsHtml = '';
    if (state === 'correct' && pts > 0) {
      ptsHtml = '<span class="as-qr-pts">+' + pts + ' pts</span>';
    } else if (state === 'wrong' || (state === 'correct' && pts === 0)) {
      ptsHtml = '<span class="as-qr-pts zero">0 pts</span>';
    }

    // Tags
    var tags = [];
    if (a && a.is_clutch)                                           tags.push('<span class="as-qr-tag clutch">Clutch</span>');
    if (a && a.streak_at_answer >= 3)                               tags.push('<span class="as-qr-tag streak">Streak ×' + a.streak_at_answer + '</span>');
    if (a && a.leader_gap_at_answer > 20)                           tags.push('<span class="as-qr-tag comeback">Comeback</span>');
    if (q.difficulty_multiplier && q.difficulty_multiplier > 1.1)  tags.push('<span class="as-qr-tag diff">Hard</span>');

    var footerParts = [];
    if (ptsHtml) footerParts.push(ptsHtml);
    footerParts = footerParts.concat(tags);

    return '<div class="as-qr-card ' + state + '" data-qid="' + escAttr(q.id) + '">'
      + '<div class="as-qr-top">'
      +   '<span class="as-qr-badge ' + state + '">' + badgeLabel + '</span>'
      +   '<span class="as-qr-qtext">' + escHtml(q.question_text || '') + '</span>'
      + '</div>'
      + (answersHtml ? '<div class="as-qr-answers">' + answersHtml + '</div>' : '')
      + (footerParts.length ? '<div class="as-qr-footer">' + footerParts.join('') + '</div>' : '')
      + '</div>';
  });

  el.innerHTML = '<div class="as-qreview-section">'
    + '<div class="as-qreview-title">Question Breakdown</div>'
    + cards.join('')
    + '</div>';

  // Scroll to and highlight the deep-linked question in the review list
  if (focusId) {
    requestAnimationFrame(function() {
      var target = el.querySelector('[data-qid="' + focusId + '"]');
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        highlightElement(target);
      }
    });
  }
}

// ── History drawer ────────────────────────────────────────────────────────
function openHistory() {
  historyOpen = true;
  var overlay = document.getElementById('as-hist-overlay');
  if (overlay) overlay.classList.add('open');
  renderHistory();
}

function closeHistory() {
  historyOpen = false;
  historyHasNewQ = false;
  var overlay = document.getElementById('as-hist-overlay');
  var banner  = document.getElementById('as-hist-new-banner');
  var btn     = document.getElementById('as-hist-btn');
  if (overlay) overlay.classList.remove('open');
  if (banner)  banner.classList.remove('show');
  if (btn)     btn.classList.remove('has-new');
}

function renderHistory() {
  var body = document.getElementById('as-hist-body');
  if (!body) return;

  var now = new Date();

  // Exclude questions whose answer window is still open (active)
  var past = (currentQuestions || []).filter(function(q) {
    var closes = q.answer_closes_at ? new Date(q.answer_closes_at) : null;
    return !closes || closes <= now;
  });

  // Newest first
  past.sort(function(a, b) {
    return new Date(b.created_at || 0) - new Date(a.created_at || 0);
  });

  if (!past.length) {
    body.innerHTML = '<div class="as-hist-empty">No past questions yet.<br>Answered questions will appear here.</div>';
    return;
  }

  var cards = past.map(function(q) {
    var a     = myAnswers[q.question_id] || myAnswers[q.id];
    var opts  = parseOptions(q.options);

    // Determine state
    var state;
    if (!a) {
      state = q.resolution_status === 'resolved' ? 'missed' : 'pending';
    } else if (a.is_correct === true)  { state = 'correct'; }
    else if (a.is_correct === false)   { state = 'wrong'; }
    else                               { state = 'pending'; }

    var badgeLabel = state === 'correct' ? '✓ Correct'
                   : state === 'wrong'   ? '✗ Wrong'
                   : state === 'missed'  ? '— Missed'
                   : '… Awaiting';

    // Answer labels
    var myAnswerLabel   = '';
    var corrAnswerLabel = '';

    if (a && a.answer) {
      var myOpt = opts.find(function(o) { return o.id === a.answer || o.label === a.answer; });
      myAnswerLabel = myOpt ? myOpt.label : a.answer;
    }
    if (q.resolution_outcome) {
      var corrOpt = opts.find(function(o) { return o.id === q.resolution_outcome || o.label === q.resolution_outcome; });
      corrAnswerLabel = corrOpt ? corrOpt.label : q.resolution_outcome;
    }

    var myValClass = state === 'correct' ? 'highlight-correct' : state === 'wrong' ? 'highlight-wrong' : '';

    var answersHtml = '';
    if (myAnswerLabel) {
      answersHtml += '<div class="as-qr-answer-row">'
        + '<span class="as-qr-answer-label">Your pick</span>'
        + '<span class="as-qr-answer-val ' + myValClass + '">' + escHtml(myAnswerLabel) + '</span>'
        + '</div>';
    }
    if (corrAnswerLabel && state !== 'pending') {
      answersHtml += '<div class="as-qr-answer-row">'
        + '<span class="as-qr-answer-label">Answer</span>'
        + '<span class="as-qr-answer-val highlight-correct">' + escHtml(corrAnswerLabel) + '</span>'
        + '</div>';
    }

    var pts     = a && a.points_earned != null ? a.points_earned : 0;
    var ptsHtml = '';
    if (state === 'correct' && pts > 0)                       { ptsHtml = '<span class="as-qr-pts">+' + pts + ' pts</span>'; }
    else if (state === 'wrong' || (state === 'correct' && pts === 0)) { ptsHtml = '<span class="as-qr-pts zero">0 pts</span>'; }

    var tags = [];
    if (a && a.is_clutch)                                           tags.push('<span class="as-qr-tag clutch">Clutch</span>');
    if (a && a.streak_at_answer >= 3)                               tags.push('<span class="as-qr-tag streak">Streak ×' + a.streak_at_answer + '</span>');
    if (a && a.leader_gap_at_answer > 20)                           tags.push('<span class="as-qr-tag comeback">Comeback</span>');
    if (q.difficulty_multiplier && q.difficulty_multiplier > 1.1)  tags.push('<span class="as-qr-tag diff">Hard</span>');

    var footerParts = ptsHtml ? [ptsHtml].concat(tags) : tags;

    return '<div class="as-qr-card ' + state + '" data-qid="' + escAttr(q.question_id || q.id) + '">'
      + '<div class="as-qr-top">'
      +   '<span class="as-qr-badge ' + state + '">' + badgeLabel + '</span>'
      +   '<span class="as-qr-qtext">' + escHtml(q.question_text || '') + '</span>'
      + '</div>'
      + (answersHtml ? '<div class="as-qr-answers">' + answersHtml + '</div>' : '')
      + (footerParts.length ? '<div class="as-qr-footer">' + footerParts.join('') + '</div>' : '')
      + '</div>';
  });

  body.innerHTML = cards.join('');
  body.dispatchEvent(new CustomEvent('history-rendered'));
}

// XP amounts per outcome
var XP_WIN   = 50;
var XP_DRAW  = 25;
var XP_LOSS  = 15;

async function awardSessionXp(iWon, isDraw) {
  if (!window.sb || !currentUserId || !currentSessionId) return null;
  try {
    var eventType = iWon ? 'arena_win' : isDraw ? 'arena_draw' : 'arena_loss';
    var xpAmount  = iWon ? XP_WIN : isDraw ? XP_DRAW : XP_LOSS;
    var { data, error } = await window.sb.rpc('award_xp', {
      p_user_id:     currentUserId,
      p_xp_amount:   xpAmount,
      p_event_type:  eventType,
      p_source_type: 'arena',
      p_source_id:   currentSessionId,
      p_metadata:    {}
    });
    if (error) {
      // RPC may not exist yet (migration 035 not applied) — degrade silently
      console.warn('[arena] award_xp error (migration 035 applied?)', error.message);
      return null;
    }
    if (data && data.duplicate) return null; // already awarded for this session
    return data;
  } catch(e) {
    console.warn('[arena] award_xp exception:', e);
    return null;
  }
}

async function updateArenaRatings() {
  if (!window.sb || !currentSessionId) return null;
  try {
    var { data, error } = await window.sb.rpc('update_arena_ratings', {
      p_session_id: currentSessionId
    });
    if (error) {
      console.warn('[arena] update_arena_ratings error (migration 036 applied?)', error.message);
      return null;
    }
    if (data && data.skip_reason) {
      console.log('[arena] rating skip:', data.skip_reason, 'invalid_match:', data.invalid_match);
    }
    return data;
  } catch(e) {
    console.warn('[arena] update_arena_ratings exception:', e);
    return null;
  }
}

// ── Realtime ──────────────────────────────────────────────────────────────
function startRealtime() {
  stopRealtime();

  // Subscribe to session status changes
  sessionChannel = window.sb.channel('as-session-' + currentSessionId)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'arena_sessions',
      filter: 'id=eq.' + currentSessionId,
    }, function(payload) {
      if (payload.new) {
        sessionData = Object.assign(sessionData || {}, payload.new);
        if (sessionData.status === 'completed' || sessionData.status === 'cancelled') {
          loadPlayers().then(function() { showCompleteOverlay(); });
          stopRealtime(); stopPoll(); stopTimerTick();
        }
      }
    })
    .subscribe(function(status) {
      if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
        stopPoll(); startPoll(5000);
      }
    });

  // Subscribe to questions for this arena session
  questionsChannel = window.sb.channel('as-questions-' + currentSessionId)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'questions',
      filter: 'arena_session_id=eq.' + currentSessionId,
    }, function() {
      loadQuestions().then(function() { renderFeed(); });
    })
    .subscribe(function(status) {
      if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
        stopPoll(); startPoll(5000);
      }
    });

  // Subscribe to player score updates
  playersChannel = window.sb.channel('as-players-' + currentSessionId)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'arena_session_players',
      filter: 'session_id=eq.' + currentSessionId,
    }, function() {
      loadPlayers().then(function() { renderScoreboard(); });
    })
    .subscribe(function(status) {
      if (status === 'SUBSCRIBED') {
        // Re-evaluate poll rate when Realtime is active
        stopPoll(); startPoll(30000);
      }
      if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
        stopPoll(); startPoll(5000);
      }
    });
}

function stopRealtime() {
  if (sessionChannel)   { window.sb.removeChannel(sessionChannel);   sessionChannel   = null; }
  if (questionsChannel) { window.sb.removeChannel(questionsChannel); questionsChannel = null; }
  if (playersChannel)   { window.sb.removeChannel(playersChannel);   playersChannel   = null; }
}

// ── Polling ───────────────────────────────────────────────────────────────
function startPoll(ms) {
  stopPoll();
  ms = ms || 5000;
  pollInterval = setInterval(function() {
    loadQuestions().then(function() { renderFeed(); });
    loadPlayers().then(function() { renderScoreboard(); });
    loadSession();
  }, ms);
}

function stopPoll() {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

// ── Timer tick ────────────────────────────────────────────────────────────
function startTimerTick() {
  stopTimerTick();
  timerInterval = setInterval(tickTimers, 1000);
}

function stopTimerTick() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function tickTimers() {
  var now = Date.now();
  document.querySelectorAll('.as-timer[data-closes-at]').forEach(function(el) {
    var ms = new Date(el.dataset.closesAt) - now;
    el.textContent = fmtMs(ms);
    if (ms < 60000) el.classList.add('urgent');
  });
  document.querySelectorAll('.as-timer-bar-wrap[data-closes-at]').forEach(function(wrap) {
    var ms    = Math.max(0, new Date(wrap.dataset.closesAt) - now);
    var total = parseInt(wrap.dataset.totalMs, 10) || 1;
    var pct   = Math.round((ms / total) * 100);
    var fill  = wrap.querySelector('.as-timer-bar-fill');
    if (fill) fill.style.width = pct + '%';
    if (ms < 60000) wrap.classList.add('urgent');
  });
}

// ── Utilities ─────────────────────────────────────────────────────────────
function qState(q) {
  var now = new Date();
  var vf  = q.visible_from ? new Date(q.visible_from) : (q.opens_at ? new Date(q.opens_at) : null);
  if (vf && vf > now) return 'upcoming';
  if (q.resolution_status === 'resolved') return 'resolved';
  if (q.resolution_status === 'voided')   return 'voided';
  var closes = qClosesAt(q);
  if (closes && now > closes) return 'closed';
  return 'active';
}

function qClosesAt(q) {
  var t = q.answer_closes_at || q.deadline;
  return t ? new Date(t) : null;
}

function detectLane(q) {
  if (q.question_type === 'CORE_MATCH_LIVE')     return 'LIVE';
  if (q.question_type === 'CORE_MATCH_PREMATCH') return 'PREMATCH';
  if (q.question_type === 'REAL_WORLD')          return 'REAL_WORLD';
  if (q.match_minute_at_generation != null)      return 'LIVE';
  return 'PREMATCH';
}

function parseOptions(opts) {
  if (!opts) return [];
  var arr = Array.isArray(opts) ? opts : (() => { try { return JSON.parse(opts); } catch(e) { return []; } })();
  return arr.map(function(o) {
    if (typeof o === 'string') return { id: o.toLowerCase().replace(/\s+/g, '_'), label: o };
    return o;
  });
}

function fmtMs(ms) {
  if (ms <= 0) return '0s';
  var s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) {
  return String(s || '').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

function showToast(msg) {
  var el = document.getElementById('as-toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 3000);
}

function showPtsNotif(pts) {
  var el = document.getElementById('as-pts-notif');
  if (!el) return;
  el.textContent = '+' + pts + ' pts · Correct answer!';
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 3500);
}

function getStreakBadgeHtml(streak) {
  if (streak < 2) return '';
  if (streak >= 4) return '<span class="as-streak-badge hot">🔥 Hot streak · ×1.3</span>';
  return '<span class="as-streak-badge">' + (streak === 2 ? '🔥 2 in a row' : '🔥 3 in a row') + '</span>';
}

function updateStreakUI(streak) {
  var myEl = document.getElementById('as-my-streak');
  if (myEl) {
    if (streak >= 2) {
      myEl.className = 'as-streak-badge' + (streak >= 4 ? ' hot' : '');
      myEl.textContent = streak >= 4 ? '🔥 Hot streak · ×1.3' : (streak === 2 ? '🔥 2 in a row' : '🔥 3 in a row');
    } else {
      myEl.className = 'as-streak-badge';
      myEl.textContent = '';
    }
  }
  // Opponent streak is never shown — always keep empty
}

function showStreakNotif(streak) {
  if (streak < 2) return;
  var el = document.getElementById('as-streak-notif');
  if (!el) return;
  var isHot = streak >= 4;
  el.className = 'as-streak-notif' + (isHot ? ' hot' : '');
  if (isHot) {
    el.textContent = '🔥 Hot streak · ×1.3 multiplier active!';
  } else if (streak === 3) {
    el.textContent = '🔥 3 in a row · ×1.2 multiplier active!';
  } else {
    el.textContent = '🔥 2 in a row · ×1.1 multiplier active!';
  }
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 3500);
}

function getComeback(myScore, oppScore) {
  var gap = oppScore - myScore;
  if (gap <= 20) return null;
  if (gap > 100) return { gap: gap, multLabel: '×1.3', copyLabel: 'Massive comeback window', popupLabel: 'Massive comeback ×1.3', isMax: true };
  if (gap > 50)  return { gap: gap, multLabel: '×1.2', copyLabel: 'Big comeback window',     popupLabel: 'Comeback bonus ×1.2',   isMax: false };
  return           { gap: gap, multLabel: '×1.1', copyLabel: 'Comeback window',           popupLabel: 'Comeback bonus ×1.1',   isMax: false };
}

function updateComebackUI(myScore, oppScore) {
  var el = document.getElementById('as-my-comeback');
  if (!el) return;
  var cb = getComeback(myScore, oppScore);
  el.textContent = cb ? (cb.copyLabel + ' · ' + cb.multLabel) : '';
}

function showComebackNotif(myScore, oppScore) {
  var cb = getComeback(myScore, oppScore);
  if (!cb) return;
  var el = document.getElementById('as-comeback-notif');
  if (!el) return;
  el.textContent = cb.popupLabel;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 3500);
}

function isDisplayClutch(q) {
  if ((q.question_type || '') !== 'CORE_MATCH_LIVE') return false;

  var minute = q.match_minute_at_generation;
  if (!minute) return false;

  var scope = sessionData && sessionData.half_scope;
  var inWindow = (scope === 'first_half') ? (minute >= 35) : (minute >= 80);
  if (!inWindow) return false;

  // 3A. Match score from clutch_context (preferred)
  var ctx = q.clutch_context;
  if (ctx && typeof ctx === 'string') { try { ctx = JSON.parse(ctx); } catch(e) { ctx = null; } }
  if (ctx && typeof ctx.homeScore === 'number' && typeof ctx.awayScore === 'number') {
    if (Math.abs(ctx.homeScore - ctx.awayScore) <= 1) return true;
  }

  // 3B. Arena score gap — only if BOTH players are present
  var me  = players.find(function(p) { return p.user_id === currentUserId; });
  var opp = players.find(function(p) { return p.user_id !== currentUserId; });
  if (me && opp) {
    return Math.abs((me.score || 0) - (opp.score || 0)) <= 20;
  }

  return false;
}

// ── Cleanup ───────────────────────────────────────────────────────────────
document.addEventListener('visibilitychange', function() {
  if (document.hidden) {
    stopRealtime(); stopPoll(); stopTimerTick();
  } else {
    Promise.all([loadQuestions(), loadPlayers(), loadSession()]).then(function() {
      renderFeed(); renderScoreboard();
      if (sessionData && sessionData.status !== 'completed' && sessionData.status !== 'cancelled') {
        startRealtime(); startPoll(); startTimerTick();
      }
    });
  }
});

window.addEventListener('beforeunload', function() {
  stopRealtime(); stopPoll(); stopTimerTick();
});
