<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arena Match — Spontix</title>
  <meta name="view-transition" content="same-origin">
  <style>html{background:#080815;margin:0;padding:0}</style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --lime:   #A8E10C;
      --purple: #7C5CFC;
      --coral:  #FF6B6B;
      --teal:   #4ECDC4;
      --navy:   #080815;
      --card-bg: rgba(255,255,255,0.05);
      --border:  rgba(255,255,255,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      background:
        radial-gradient(ellipse 80% 45% at 50% -5%, rgba(168,225,12,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 55% 40% at 85% 105%, rgba(124,92,252,0.08) 0%, transparent 55%),
        linear-gradient(175deg, #0d0d24 0%, #090917 40%, #080815 70%, #050510 100%);
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      animation: page-enter 120ms ease;
    }
    #app { display: block !important; width: 100% !important; margin-left: 0 !important; }
    @keyframes page-enter { from { opacity: 0; } to { opacity: 1; } }

    /* ── TOPBAR ── */
    .as-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,21,0.95);
      position: sticky; top: 0; z-index: 50;
      backdrop-filter: blur(12px);
    }

    .as-match-badge {
      flex: 1; display: flex; align-items: center; gap: 8px; font-size: 0.82rem; font-weight: 700;
    }
    .as-live-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--lime);
      animation: as-pulse 1.8s infinite;
    }
    @keyframes as-pulse { 0%,100%{opacity:1}50%{opacity:0.35} }
    .as-match-name { color: rgba(255,255,255,0.9); }
    .as-half-badge {
      font-size: 0.65rem; font-weight: 700; padding: 3px 8px; border-radius: 10px;
      background: rgba(168,225,12,0.15); color: var(--lime); text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .as-mode-badge {
      font-size: 0.65rem; font-weight: 700; padding: 3px 8px; border-radius: 10px;
      background: rgba(124,92,252,0.15); color: var(--purple);
    }

    /* ── DUEL HEADER ── */
    .as-duel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 20px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
    }
    .as-duel-player {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      flex: 0 0 auto; width: 100px;
    }
    .as-avatar-ring {
      position: relative; width: 64px; height: 64px; border-radius: 50%;
      padding: 3px;
      background: conic-gradient(rgba(255,255,255,0.1) 0deg, rgba(255,255,255,0.1) 360deg);
      transition: background 0.4s ease, box-shadow 0.4s ease;
    }
    .as-avatar-ring.leading {
      background: conic-gradient(var(--lime) 0deg, rgba(168,225,12,0.4) 360deg);
      box-shadow: 0 0 16px rgba(168,225,12,0.3);
    }
    .as-avatar-ring.losing {
      background: conic-gradient(var(--coral) 0deg, rgba(255,107,107,0.4) 360deg);
      box-shadow: 0 0 12px rgba(255,107,107,0.2);
    }
    .as-avatar {
      width: 100%; height: 100%; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 900; color: rgba(255,255,255,0.9);
    }
    .as-duel-handle {
      font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.8);
      max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      text-align: center;
    }
    .as-duel-handle.me { color: var(--lime); }
    .as-duel-score-block {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .as-duel-score {
      display: flex; align-items: center; gap: 6px;
      font-size: 3rem; font-weight: 900; letter-spacing: -2px; line-height: 1;
    }
    .as-duel-score-me { color: var(--lime); }
    .as-duel-score-opp { color: rgba(255,255,255,0.85); }
    .as-duel-score-sep {
      font-size: 1.8rem; font-weight: 400; color: rgba(255,255,255,0.2); margin: 0 2px;
    }
    .as-duel-score-label {
      font-size: 0.58rem; font-weight: 800; letter-spacing: 0.12em;
      color: rgba(255,255,255,0.2); text-transform: uppercase;
    }

    /* ── MAIN LAYOUT ── */
    .as-body {
      max-width: 640px; margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* ── QUESTION FEED ── */
    .as-feed-label {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: rgba(255,255,255,0.35); margin-bottom: 12px;
    }
    .as-feed-empty {
      text-align: center; padding: 48px 24px;
      color: rgba(255,255,255,0.4); font-size: 0.88rem;
    }
    .as-feed-empty svg {
      width: 36px; height: 36px; stroke: rgba(255,255,255,0.2); fill: none; stroke-width: 1.5;
      display: block; margin: 0 auto 12px;
    }

    /* ── HOLDING CARD ── */
    .as-holding {
      border: 1px solid var(--border); border-radius: 14px;
      padding: 24px; text-align: center; margin-bottom: 16px;
      background: rgba(168,225,12,0.03);
    }
    .as-holding-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--lime);
      margin: 0 auto 12px; animation: as-pulse 1.8s infinite;
    }
    .as-holding-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; }
    .as-holding-sub { font-size: 0.76rem; color: rgba(255,255,255,0.45); }

    /* ── QUESTION CARD ── */
    .as-qcard {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 18px; margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    .as-qcard.primary {
      border-color: rgba(168,225,12,0.35);
      background: rgba(168,225,12,0.04);
    }
    .as-qcard.resolved-correct { border-color: rgba(168,225,12,0.4); }
    .as-qcard.resolved-wrong   { border-color: rgba(255,107,107,0.3); }
    .as-qcard.voided           { opacity: 0.5; }
    @keyframes as-glow-correct {
      0%  { box-shadow: 0 0 0 0 rgba(168,225,12,0); }
      50% { box-shadow: 0 0 0 6px rgba(168,225,12,0.25); }
      100%{ box-shadow: 0 0 0 0 rgba(168,225,12,0); }
    }
    @keyframes as-shake-wrong {
      0%,100%{ transform: translateX(0); }
      25%{ transform: translateX(-4px); }
      75%{ transform: translateX(4px); }
    }
    .as-qcard.glow-correct { animation: as-glow-correct 0.8s ease forwards; }
    .as-qcard.shake-wrong  { animation: as-shake-wrong 0.4s ease forwards; }

    @keyframes as-deep-link-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(168,225,12,0.6); }
      70%  { box-shadow: 0 0 0 12px rgba(168,225,12,0); }
      100% { box-shadow: 0 0 0 0 rgba(168,225,12,0); }
    }
    .deep-link-highlight {
      animation: as-deep-link-pulse 0.7s ease 2;
      outline: 2px solid rgba(168,225,12,0.7);
      outline-offset: 2px;
    }

    @keyframes as-card-enter {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .as-qcard { animation: as-card-enter 0.28s ease both; }
    .as-qcard.clutch-state {
      border-color: rgba(255,159,67,0.35);
      background: rgba(255,159,67,0.04);
      animation: as-card-enter 0.28s ease both, as-clutch-border 2s 0.28s ease infinite;
    }
    @keyframes as-clutch-border {
      0%,100% { border-color: rgba(255,159,67,0.35); }
      50%     { border-color: rgba(255,159,67,0.65); }
    }

    .as-qcard-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .as-lane-badge {
      font-size: 0.6rem; font-weight: 800; padding: 3px 7px; border-radius: 8px;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .as-lane-badge.live    { background: rgba(255,107,107,0.18); color: var(--coral); }
    .as-lane-badge.prematch{ background: rgba(168,225,12,0.15); color: var(--lime); }
    .as-lane-badge.rw      { background: rgba(124,92,252,0.15); color: var(--purple); }

    .as-timer {
      margin-left: auto; font-size: 0.72rem; font-weight: 700;
      color: rgba(255,255,255,0.5);
    }
    .as-timer.urgent { color: var(--coral); }

    .as-live-window-strip {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-radius: 8px; margin-bottom: 10px;
      background: rgba(255,107,107,0.05); border: 1px solid rgba(255,107,107,0.12);
      font-size: 0.7rem; color: rgba(255,255,255,0.6);
    }

    .as-question-text {
      font-size: 1.02rem; font-weight: 700; line-height: 1.4; margin-bottom: 14px;
    }

    /* ── OPTIONS ── */
    .as-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .as-opt {
      padding: 11px 14px; border-radius: 10px; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s; text-align: left;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.9); font-family: inherit;
      display: flex; align-items: center; gap: 8px;
    }
    .as-opt:hover:not(:disabled) { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.18); }
    .as-opt:active:not(:disabled) { transform: scale(0.98); }
    .as-opt.selected {
      background: rgba(168,225,12,0.12); border-color: rgba(168,225,12,0.4);
      color: var(--lime);
    }
    .as-opt.correct  { background: rgba(168,225,12,0.15); border-color: var(--lime); color: var(--lime); }
    .as-opt.wrong    { background: rgba(255,107,107,0.1); border-color: var(--coral); color: var(--coral); }
    .as-opt.disabled-opt { opacity: 0.45; cursor: default; }
    .as-opt-icon { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── CARD FOOTER ── */
    .as-qcard-footer {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.7rem; color: rgba(255,255,255,0.4);
      border-top: 1px solid rgba(255,255,255,0.06); padding-top: 10px;
    }
    .as-pts-range { margin-left: auto; color: rgba(255,255,255,0.5); font-weight: 600; }
    .as-result-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; font-weight: 700;
    }
    .as-result-correct { color: var(--lime); }
    .as-result-wrong   { color: var(--coral); }
    .as-result-voided  { color: rgba(255,255,255,0.4); }

    /* ── TIMER BAR ── */
    .as-timer-bar-wrap {
      height: 5px; border-radius: 3px; background: rgba(255,255,255,0.08);
      overflow: hidden; margin-bottom: 12px;
    }
    .as-timer-bar-fill {
      height: 100%; border-radius: 3px; background: var(--lime);
      transition: width 1s linear;
    }
    .as-timer-bar-wrap.urgent .as-timer-bar-fill {
      background: var(--coral);
      box-shadow: 0 0 6px rgba(255,107,107,0.6);
      animation: as-urgency-pulse 0.6s ease infinite;
    }
    @keyframes as-urgency-pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.55; }
    }

    /* ── ENGAGEMENT BADGES ── */
    .as-eng-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .as-eng-badge {
      font-size: 0.58rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.06em; padding: 3px 7px; border-radius: 6px;
    }
    .as-eng-badge.hv  { background: rgba(168,225,12,0.15); color: var(--lime); }
    .as-eng-badge.clutch { background: rgba(255,159,67,0.15); color: #FF9F43; }
    .as-eng-badge.fast{ background: rgba(255,107,107,0.15); color: var(--coral); }
    .as-eng-badge.streak { background: rgba(255,159,67,0.18); color: #FF9F43; }
    .as-eng-badge.hot-streak { background: rgba(255,107,107,0.18); color: var(--coral); animation: as-pulse 1.4s infinite; }

    /* ── SCOREBOARD STREAK BADGE ── */
    .as-streak-badge {
      font-size: 0.62rem; font-weight: 700; color: #FF9F43;
      margin-top: 3px; min-height: 16px;
    }
    .as-streak-badge.hot { color: var(--coral); animation: as-pulse 1.4s infinite; }

    /* ── CURRENT PICK LABEL ── */
    .as-current-pick {
      font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-top: -4px; margin-bottom: 8px;
    }

    /* ── SESSION COMPLETE ── */
    .as-complete-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(8,8,21,0.97); backdrop-filter: blur(16px);
      flex-direction: column; align-items: center;
      overflow-y: auto; padding: 0; text-align: center;
    }
    .as-complete-overlay.show { display: flex; }
    .as-complete-inner {
      display: flex; flex-direction: column; align-items: center;
      width: 100%; max-width: 520px; padding: 32px 20px 40px;
      gap: 0; box-sizing: border-box;
    }

    /* result headline */
    @keyframes as-result-pop {
      0%   { opacity: 0; transform: scale(0.8); }
      70%  { transform: scale(1.06); }
      100% { opacity: 1; transform: scale(1); }
    }
    .as-result-headline {
      font-size: 2.4rem; font-weight: 900; letter-spacing: -1px; line-height: 1;
      margin-bottom: 6px;
      animation: as-result-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .as-result-headline.win  { color: var(--lime); }
    .as-result-headline.draw { color: rgba(255,255,255,0.9); }
    .as-result-headline.loss { color: var(--coral); }
    .as-result-subtitle {
      font-size: 0.82rem; color: rgba(255,255,255,0.45); margin-bottom: 32px;
      animation: as-result-pop 0.5s 0.05s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    /* duel row */
    @keyframes as-result-slide {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .as-result-duel {
      display: flex; align-items: center; gap: 24px; margin-bottom: 28px;
      animation: as-result-slide 0.45s 0.15s ease both;
    }
    .as-result-player { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .as-result-ring {
      position: relative; width: 72px; height: 72px; border-radius: 50%; padding: 3px;
      background: conic-gradient(rgba(255,255,255,0.1) 0deg, rgba(255,255,255,0.1) 360deg);
    }
    @keyframes as-winner-ring {
      0%,100% { box-shadow: 0 0 16px rgba(168,225,12,0.35); }
      50%     { box-shadow: 0 0 28px rgba(168,225,12,0.6); }
    }
    .as-result-ring.winner {
      background: conic-gradient(var(--lime) 0deg, rgba(168,225,12,0.5) 360deg);
      animation: as-winner-ring 1.8s ease infinite;
    }
    .as-result-ring.loser {
      background: conic-gradient(var(--coral) 0deg, rgba(255,107,107,0.3) 360deg);
    }
    .as-result-avatar {
      width: 100%; height: 100%; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; font-weight: 900; color: rgba(255,255,255,0.9);
    }
    .as-result-handle {
      font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.7);
      max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .as-result-handle.me { color: var(--lime); }
    .as-result-final-score {
      font-size: 2rem; font-weight: 900; color: rgba(255,255,255,0.9); line-height: 1;
    }
    .as-result-final-score.winner { color: var(--lime); }
    .as-result-vs {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .as-result-vs-sep {
      font-size: 0.65rem; font-weight: 800; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.2); text-transform: uppercase;
    }

    /* stats row */
    .as-result-stats {
      display: flex; gap: 16px; margin-bottom: 32px;
      animation: as-result-slide 0.45s 0.28s ease both;
    }
    .as-result-stat {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 12px 20px; min-width: 90px;
    }
    .as-result-stat-val { font-size: 1.4rem; font-weight: 900; color: rgba(255,255,255,0.9); }
    .as-result-stat-val.lime { color: var(--lime); }
    .as-result-stat-label { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-top: 2px; }

    .as-xp-earned { display: inline-block; margin-top: 6px; padding: 2px 8px; border-radius: 20px; font-size: 0.68rem; font-weight: 700; background: rgba(168,225,12,0.15); color: var(--lime); letter-spacing: 0.5px; }
    .as-rating-delta { display: inline-block; margin-top: 6px; padding: 2px 8px; border-radius: 20px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.5px; }
    .as-rating-delta.gain { background: rgba(78,205,196,0.15); color: #4ECDC4; }
    .as-rating-delta.loss { background: rgba(255,107,107,0.15); color: #FF6B6B; }
    .as-rating-delta.none { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.4); }
    .as-complete-btn {
      padding: 14px 40px; border-radius: 50px; border: none; cursor: pointer;
      font-family: inherit; font-size: 0.9rem; font-weight: 800;
      background: var(--lime); color: var(--navy); transition: opacity 0.2s;
      animation: as-result-slide 0.45s 0.4s ease both;
    }
    .as-complete-btn:hover { opacity: 0.85; }

    /* ── QUESTION REVIEW ── */
    .as-qreview-section {
      width: 100%; margin-top: 28px; text-align: left;
    }
    .as-qreview-title {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(255,255,255,0.4);
      margin-bottom: 12px; padding-left: 2px;
    }
    .as-qr-card {
      background: rgba(255,255,255,0.04); border-radius: 10px;
      border-left: 3px solid rgba(255,255,255,0.12);
      padding: 12px 14px; margin-bottom: 8px;
    }
    .as-qr-card.correct  { border-left-color: var(--lime); }
    .as-qr-card.wrong    { border-left-color: var(--coral); }
    .as-qr-card.missed   { border-left-color: rgba(255,255,255,0.18); opacity: 0.65; }
    .as-qr-card.pending  { border-left-color: rgba(255,200,80,0.5); }
    .as-qr-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
    .as-qr-badge {
      flex-shrink: 0; font-size: 0.62rem; font-weight: 800; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 3px 8px; border-radius: 20px;
      margin-top: 1px;
    }
    .as-qr-badge.correct { background: rgba(168,225,12,0.15); color: var(--lime); }
    .as-qr-badge.wrong   { background: rgba(255,107,107,0.15); color: var(--coral); }
    .as-qr-badge.missed  { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.45); }
    .as-qr-badge.pending { background: rgba(255,200,80,0.12); color: rgba(255,200,80,0.9); }
    .as-qr-qtext {
      font-size: 0.82rem; font-weight: 600; color: rgba(255,255,255,0.88); line-height: 1.4;
    }
    .as-qr-answers { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
    .as-qr-answer-row { display: flex; gap: 6px; font-size: 0.75rem; align-items: baseline; }
    .as-qr-answer-label {
      color: rgba(255,255,255,0.4); font-weight: 600; font-size: 0.68rem;
      text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0; min-width: 52px;
    }
    .as-qr-answer-val { color: rgba(255,255,255,0.75); font-weight: 500; }
    .as-qr-answer-val.highlight-correct { color: var(--lime); font-weight: 700; }
    .as-qr-answer-val.highlight-wrong   { color: var(--coral); font-weight: 700; }
    .as-qr-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .as-qr-pts {
      font-size: 0.72rem; font-weight: 800; color: var(--lime);
      background: rgba(168,225,12,0.1); border-radius: 20px; padding: 2px 9px;
    }
    .as-qr-pts.zero { color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); }
    .as-qr-tag {
      font-size: 0.62rem; font-weight: 700; padding: 2px 7px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .as-qr-tag.clutch   { background: rgba(255,107,107,0.12); color: var(--coral); }
    .as-qr-tag.streak   { background: rgba(168,225,12,0.1);   color: var(--lime); }
    .as-qr-tag.comeback { background: rgba(78,205,196,0.12);  color: var(--teal); }
    .as-qr-tag.diff     { background: rgba(124,92,252,0.12);  color: var(--purple); }
    .as-qreview-empty {
      font-size: 0.8rem; color: rgba(255,255,255,0.3); padding: 12px 0; text-align: center;
    }

    /* ── HISTORY DRAWER ── */
    @keyframes as-hist-slide {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .as-hist-btn {
      position: fixed; right: 16px;
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 160;
      display: flex; align-items: center; gap: 6px;
      padding: 9px 16px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(26,26,46,0.92); backdrop-filter: blur(10px);
      font-family: inherit; font-size: 0.78rem; font-weight: 700;
      color: rgba(255,255,255,0.7); cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    .as-hist-btn:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
    .as-hist-btn.has-new { border-color: var(--lime); color: var(--lime); }
    .as-hist-btn .as-hist-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--lime);
      display: none;
    }
    .as-hist-btn.has-new .as-hist-dot { display: block; animation: as-pulse 1.4s ease infinite; }
    .as-hist-overlay {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 155;
      max-height: 75vh; display: flex; flex-direction: column;
      background: #0f0f1e; border-top: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px 16px 0 0;
      transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
      pointer-events: none;
    }
    .as-hist-overlay.open { transform: translateY(0); pointer-events: all; }
    .as-hist-handle {
      width: 36px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.2);
      margin: 10px auto 0; flex-shrink: 0;
    }
    .as-hist-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px 8px; flex-shrink: 0;
    }
    .as-hist-title {
      font-size: 0.72rem; font-weight: 800; letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(255,255,255,0.5);
    }
    .as-hist-close {
      background: none; border: none; cursor: pointer; padding: 4px;
      color: rgba(255,255,255,0.4); font-size: 1rem; line-height: 1;
      transition: color 0.15s;
    }
    .as-hist-close:hover { color: #fff; }
    .as-hist-new-banner {
      display: none; align-items: center; justify-content: space-between;
      margin: 0 12px 8px; padding: 9px 14px; border-radius: 8px;
      background: rgba(168,225,12,0.1); border: 1px solid rgba(168,225,12,0.25);
      font-size: 0.75rem; font-weight: 700; color: var(--lime); cursor: pointer;
      gap: 8px; flex-shrink: 0;
    }
    .as-hist-new-banner.show { display: flex; }
    .as-hist-new-banner span { flex: 1; }
    .as-hist-new-banner .as-hist-arrow { font-size: 0.9rem; }
    .as-hist-body {
      flex: 1; overflow-y: auto; padding: 0 12px 24px; -webkit-overflow-scrolling: touch;
    }
    .as-hist-empty {
      text-align: center; color: rgba(255,255,255,0.3);
      font-size: 0.8rem; padding: 32px 16px;
    }

    /* ── TOAST ── */
    .as-toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(30,30,50,0.95); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px; padding: 10px 20px; font-size: 0.82rem; font-weight: 600;
      z-index: 300; opacity: 0; transition: opacity 0.25s; pointer-events: none;
      white-space: nowrap;
    }
    .as-toast.show { opacity: 1; }

    /* ── POINTS NOTIFICATION ── */
    .as-pts-notif {
      position: fixed; bottom: 80px; right: 20px;
      background: rgba(168,225,12,0.15); border: 1px solid rgba(168,225,12,0.3);
      border-radius: 12px; padding: 8px 16px;
      font-size: 0.82rem; font-weight: 800; color: var(--lime);
      transform: translateY(40px); opacity: 0; transition: all 0.35s;
      pointer-events: none; z-index: 100;
    }
    .as-pts-notif.show { transform: translateY(0); opacity: 1; }

    /* ── STREAK NOTIFICATION ── */
    .as-streak-notif {
      position: fixed; bottom: 122px; right: 20px;
      background: rgba(255,159,67,0.15); border: 1px solid rgba(255,159,67,0.35);
      border-radius: 12px; padding: 8px 16px;
      font-size: 0.82rem; font-weight: 800; color: #FF9F43;
      transform: translateY(40px); opacity: 0; transition: all 0.35s;
      pointer-events: none; z-index: 101;
    }
    .as-streak-notif.hot {
      background: rgba(255,107,107,0.15); border-color: rgba(255,107,107,0.35);
      color: var(--coral);
    }
    .as-streak-notif.show { transform: translateY(0); opacity: 1; }

    /* ── COMEBACK UI ── */
    .as-eng-badge.comeback     { background: rgba(78,205,196,0.15); color: #4ECDC4; }
    .as-eng-badge.comeback-max { background: rgba(78,205,196,0.15); color: #4ECDC4; animation: as-pulse 1.4s infinite; }
    .as-comeback-line {
      font-size: 0.65rem; font-weight: 600; color: #4ECDC4;
      margin-top: 2px; min-height: 14px;
    }
    .as-comeback-notif {
      position: fixed; bottom: 164px; right: 20px;
      background: rgba(78,205,196,0.15); border: 1px solid rgba(78,205,196,0.35);
      border-radius: 12px; padding: 8px 16px;
      font-size: 0.82rem; font-weight: 800; color: #4ECDC4;
      transform: translateY(40px); opacity: 0; transition: all 0.35s;
      pointer-events: none; z-index: 102;
    }
    .as-comeback-notif.show { transform: translateY(0); opacity: 1; }

    /* ── SPECTATOR MODE ── */
    .as-spectator-banner {
      display: none; align-items: center; gap: 10px;
      background: rgba(124,92,252,0.12); border-bottom: 1px solid rgba(124,92,252,0.25);
      padding: 10px 20px; font-size: 0.78rem; font-weight: 600;
      color: rgba(255,255,255,0.75);
    }
    .as-spectator-banner svg { width: 16px; height: 16px; flex-shrink: 0; stroke: var(--purple); fill: none; stroke-width: 2; }
    .as-spectator-banner .as-spec-pill {
      margin-left: auto; background: rgba(124,92,252,0.2); color: var(--purple);
      font-size: 0.62rem; font-weight: 700; padding: 2px 8px; border-radius: 10px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .as-spectator-note {
      font-size: 0.72rem; color: rgba(124,92,252,0.8); margin-top: 6px; font-style: italic;
    }

    /* Locked state — private session */
    .as-locked-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 60vh; padding: 40px 24px; text-align: center;
    }
    .as-locked-icon {
      font-size: 3rem; margin-bottom: 16px; opacity: 0.6;
    }
    .as-locked-title {
      font-size: 1.2rem; font-weight: 700; color: rgba(255,255,255,0.9); margin-bottom: 8px;
    }
    .as-locked-body {
      font-size: 0.83rem; color: rgba(255,255,255,0.45); max-width: 320px; line-height: 1.55;
    }
    .as-locked-btn {
      margin-top: 28px; padding: 12px 28px; border-radius: 24px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8); font-size: 0.85rem; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: all 0.15s;
    }
    .as-locked-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }
  </style>
</head>

<!-- SESSION COMPLETE OVERLAY -->

<!-- HISTORY BUTTON + DRAWER -->
